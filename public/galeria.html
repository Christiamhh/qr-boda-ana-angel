<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Galería · Ana &amp; Ángel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/styles.css" />
  <style>
    body { display: block; padding: 0; }
    .gal-wrap { max-width: 1100px; margin: 0 auto; padding: 28px 18px 60px; }
    .gal-head { text-align: center; margin-bottom: 8px; }
    .gal-head .names { font-size: 44px; }
    .tabs { display: flex; gap: 10px; justify-content: center; margin: 18px 0 6px; }
    .tab { font-family: var(--sans); font-size: 14px; letter-spacing: .04em; padding: 9px 22px; border-radius: 999px; border: 1px solid var(--line); background: var(--paper); color: var(--ink); cursor: pointer; }
    .tab.active { background: var(--rose-deep); color: #fff; border-color: var(--rose-deep); }
    .stats { text-align: center; color: var(--muted); font-size: 13px; letter-spacing: .03em; margin: 10px 0 26px; }
    .stats b { color: var(--ink); font-weight: 400; }
    .topbar { display: flex; justify-content: space-between; align-items: center; max-width: 1100px; margin: 0 auto; padding: 14px 18px 0; }
    .topbar a, .topbar button { font-family: var(--sans); font-size: 12.5px; letter-spacing: .04em; color: var(--muted); text-decoration: none; background: none; border: none; cursor: pointer; }
    .contrib { background: var(--paper); border: 1px solid var(--line-soft); border-radius: 18px; padding: 20px 20px 16px; margin-bottom: 18px; box-shadow: var(--shadow); }
    .contrib h3 { font-family: var(--serif); font-weight: 500; font-size: 24px; margin: 0; }
    .contrib .msg { font-style: italic; color: var(--rose-deep); font-size: 15px; margin: 6px 0 4px; line-height: 1.5; }
    .contrib .when { font-size: 11.5px; color: var(--muted); letter-spacing: .04em; text-transform: uppercase; }
    .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-top: 14px; }
    .media { position: relative; border-radius: 12px; overflow: hidden; border: 1px solid var(--line); aspect-ratio: 1; background: var(--rose-soft); cursor: pointer; }
    .media img, .media video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .media .tag { position: absolute; bottom: 5px; left: 5px; background: rgba(0,0,0,.55); color:#fff; font-size: 10px; padding: 2px 6px; border-radius: 6px; }
    .media .dl { position: absolute; top: 5px; right: 5px; width: 26px; height: 26px; border-radius: 50%; background: rgba(0,0,0,.55); color: #fff; display:flex; align-items:center; justify-content:center; }
    .empty { text-align: center; color: var(--muted); padding: 60px 20px; font-size: 15px; }
    .lb { position: fixed; inset: 0; background: rgba(20,15,12,.92); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
    .lb.open { display: flex; }
    .lb img, .lb video { max-width: 94vw; max-height: 86vh; border-radius: 10px; }
    .lb .x { position: absolute; top: 18px; right: 22px; color: #fff; font-size: 30px; cursor: pointer; background: none; border: none; }
    .spinner { text-align:center; color: var(--muted); padding: 50px; }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="/qr">Descargar códigos QR</a>
    <form method="POST" action="/galeria/logout" style="margin:0"><button type="submit">Cerrar sesión</button></form>
  </div>
  <div class="gal-wrap">
    <div class="gal-head">
      <div class="eyebrow" style="margin-bottom:10px">Recuerdos de nuestra boda</div>
      <div class="names">Ana &amp; Ángel</div>
    </div>
    <div class="tabs">
      <button class="tab active" data-m="ceremonia">Ceremonia</button>
      <button class="tab" data-m="recepcion">Recepción</button>
    </div>
    <div class="stats" id="stats"></div>
    <div id="content"><div class="spinner">Cargando recuerdos…</div></div>
  </div>

  <div class="lb" id="lightbox"><button class="x" id="lb-close">&times;</button><div id="lb-content"></div></div>

  <script src="/static/js/gallery.js"></script>
</body>
</html>
